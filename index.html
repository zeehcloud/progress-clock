<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Progress</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500&display=swap" rel="stylesheet">
  <script src="script.js"></script>
</head>

<body id="body">
  <div id="megaholder">
    <div class="master" id="master">
      <div class="pholder" id="centurypholder">
        <div class="p pa" id="centuryp"></div>
      </div>
      <p class="label l" id="centurylabel">Test</p>
      <div class="pholder" id="decadepholder">
        <div class="p pa" id="decadep"></div>
      </div>
      <p class="label l" id="decadelabel">Test</p>
      <div class="pholder" id="yearpholder">
        <div class="p pa" id="yearp"></div>
      </div>
      <p class="label l" id="yearlabel">Test</p>
      <div class="pholder" id="monthpholder">
        <div class="p pa" id="monthp"></div>
      </div>
      <p class="label l" id="monthlabel">Test</p>
      <div class="pholder" id="weekpholder">
        <div class="p pa" id="weekp"></div>
      </div>
      <p class="label l" id="weeklabel">Test</p>
      <div class="pholder" id="daypholder">
        <div class="p pa" id="dayp"></div>
      </div>
      <p class="label l" id="daylabel">Test</p>
      <div class="pholder" id="hourpholder">
        <div class="p pa" id="hourp"></div>
      </div>
      <p class="label l" id="hourlabel">Test</p>
      <div class="pholder" id="minuteholder">
        <div class="p pa" id="minutep"></div>
      </div>
      <p class="label l" id="minutelabel">Test</p>
      <div class="pholder" id="secondpholder">
        <div class="p" id="secondp"></div>
      </div>
      <p class="label l" id="secondlabel">Test</p>
    </div>
    <div id="optionholder">
      <button id="themebutton" class="button option" onclick="toggleTheme()">Toggle Theme</button>
      <p id="currentthemelabel" class="label option">Current Theme: Dark</p>
      <p id="currentlayoutlabel" class="label option">Current Layout: Default</p>
      <button id="layoutbutton" class="button option" onclick="toggleLayout()">Toggle Layout</button>
    </div>
  </div>
</body>

</html>
